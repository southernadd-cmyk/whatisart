<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Artist Statement | What Is Art Comic</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    .statement-page {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 24px 36px;
      position: relative;
      z-index: 2;
    }
    .statement-card {
      margin: 12px auto 0;
      max-width: 820px;
      border: 3px solid #111;
      box-shadow: 6px 6px 0 #000;
      background: #efe9d9;
    }
    .statement-card svg {
      display: block;
      width: 100%;
      height: auto;
    }
    .statement-nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
    }
    .statement-nav a {
      color: var(--signal);
      text-decoration: none;
      border-bottom: 1px solid rgba(0, 255, 200, 0.45);
    }
    .statement-nav a:hover,
    .statement-nav a:focus-visible {
      color: #fff;
      border-bottom-color: #fff;
      outline: none;
    }
  </style>
</head>
<body data-page="statement">
  <div class="reel-backdrop" id="reelBackdrop" aria-hidden="true"></div>
  <button type="button" class="reel-sound-btn" id="reelSoundBtn" hidden aria-pressed="false" aria-label="Turn sound on for the background reel">Sound on</button>
  <div class="atmosphere" aria-hidden="true">
    <div class="atmosphere__grain"></div>
    <div class="atmosphere__scan"></div>
    <div class="atmosphere__grid"></div>
  </div>

  <main class="statement-page">
    <nav class="statement-nav" aria-label="Statement links">
      <a href="./index.html">Back to index</a>
      <a href="https://www.instagram.com/whatisart.comic/" target="_blank" rel="noopener noreferrer">Instagram: @whatisart.comic</a>
    </nav>

    <section class="statement-card" aria-label="Artist statement">
      <svg viewBox="0 0 820 1120" role="img" aria-labelledby="statementTitle statementDesc" xmlns="http://www.w3.org/2000/svg">
        <title id="statementTitle">Artist Statement</title>
        <desc id="statementDesc">A graphic statement poster about AI-generated portraits, quotes, and questions of authorship.</desc>
        <rect x="0" y="0" width="820" height="1120" fill="#efe9d9"/>

        <text x="36" y="86" font-family="Arial Black, Arial, sans-serif" font-size="48" fill="#1c1c1a">ARTIST STATEMENT</text>
        <line x1="0" y1="130" x2="820" y2="130" stroke="#20201d" stroke-width="3"/>

        <g fill="#242321" font-family="Georgia, 'Times New Roman', serif" font-size="40">
          <text x="42" y="198">A comic series asking what</text>
          <text x="42" y="246">art is-by impersonating it.</text>

          <text x="42" y="332">AI-generated portraits of artists,</text>
          <text x="42" y="380">paired with their own words</text>
          <text x="42" y="428">(or words they might say).</text>

          <text x="42" y="514">Drawn in graphite that never</text>
          <text x="42" y="562">smudged. Rendered with tools</text>
          <text x="42" y="610">they never touched.</text>

          <text x="42" y="696">Is this authorship, or automation?</text>
          <text x="42" y="744">Homage, or hijack?</text>
          <text x="42" y="792">Art, or theatre?</text>

          <text x="42" y="870">We don't answer.</text>
          <text x="42" y="918">We quote. We</text>
          <text x="42" y="966">copy. We frame.</text>
        </g>

        <g transform="translate(510 770)">
          <circle cx="130" cy="170" r="118" fill="none" stroke="#2a2a28" stroke-width="3"/>
          <path d="M24 100 C76 54, 184 54, 236 100" fill="none" stroke="#2a2a28" stroke-width="3"/>
          <text x="130" y="146" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="54" fill="#2a2a28">WHAT</text>
          <rect x="72" y="166" width="116" height="54" fill="#d06a32"/>
          <text x="130" y="209" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="50" fill="#ffffff">IS</text>
          <text x="130" y="278" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="60" fill="#bc3f24">ART?</text>
        </g>
      </svg>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
